<div class="container mt-4">

<h2>Add Book</h2>

<form (ngSubmit)="addBook()">

<div class="mb-3">
<label class="form-label">Title</label>
<input type="text" class="form-control" [(ngModel)]="book.title" name="title">
</div>

<div class="mb-3">
<label class="form-label">Author</label>
<input type="text" class="form-control" [(ngModel)]="book.author" name="author">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea class="form-control" [(ngModel)]="book.description" name="description"></textarea>
</div>

<button type="submit" class="btn btn-success">Add Book</button>

<a routerLink="/list" class="btn btn-secondary ms-2">Back to List</a>

</form>

</div>
