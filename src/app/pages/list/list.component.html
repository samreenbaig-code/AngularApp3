<div class="container mt-5">

<h2 class="mb-4">📚 Book Manager</h2>

<a routerLink="/add" class="btn btn-primary mb-3">
Add Book
</a>

<table class="table table-striped table-bordered">

<thead class="table-dark">
<tr>
<th>Image</th>
<th>Title</th>
<th>Author</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let book of books">

<td>
<img src="http://localhost/book-api/uploads/{{book.image}}" width="70">
</td>

<td>{{book.title}}</td>
<td>{{book.author}}</td>
<td>{{book.description}}</td>

<td>

<a [routerLink]="['/update', book.id]" class="btn btn-warning btn-sm me-2">
Edit
</a>

<button (click)="delete(book.id)" class="btn btn-danger btn-sm">
Delete
</button>

</td>

</tr>

</tbody>

</table>

</div>
